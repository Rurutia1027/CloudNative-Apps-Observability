server:
    port: 8083

spring:
    application:
        name: api-gateway
    zipkin:
        base-url: http://localhost:9411
    cloud:
       gateway:
          routes:
            - id: customer
              # In Kubernetes/istio, 'customer' would be the k8s service name.
              uri: http://customer:8080
              predicates:
                - Path=/api/v1/customers/**