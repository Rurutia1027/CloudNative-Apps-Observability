global:
  scrape_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # Example: scrape Spring Boot microservices running on the same Docker network.
  # Uncomment and adjust service names/ports if you also run apps via docker-compose.
