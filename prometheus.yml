global:
  scrape_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # Spring Boot microservices (same Docker network as docker-compose.dev.yml)
  - job_name: 'spring-microservices'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'customer:8080'
          - 'fraud:8081'
          - 'notification:8082'
          - 'apigw:8083'

