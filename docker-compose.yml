services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: amigoscode
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - postgres-data:/data/postgres
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U amigoscode -q" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"     # Jaeger UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    networks:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - backend
    restart: unless-stopped

  # Microservices (images from your Docker Hub repo; override with DOCKER_USER / IMAGE_TAG)
  customer:
    image: ${DOCKER_USER:-nanachi1027}/ragent-customer:${IMAGE_TAG:-latest}
    container_name: customer
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      jaeger: { condition: service_started }
    restart: unless-stopped

  fraud:
    image: ${DOCKER_USER:-nanachi1027}/ragent-fraud:${IMAGE_TAG:-latest}
    container_name: fraud
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    networks:
      - backend
    depends_on:
      postgres: { condition: service_healthy }
      jaeger: { condition: service_started }
    restart: unless-stopped

  notification:
    image: ${DOCKER_USER:-nanachi1027}/ragent-notification:${IMAGE_TAG:-latest}
    container_name: notification
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8082"
    networks:
      - backend
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      jaeger: { condition: service_started }
    restart: unless-stopped

  apigw:
    image: ${DOCKER_USER:-nanachi1027}/ragent-apigw:${IMAGE_TAG:-latest}
    container_name: apigw
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8083"
    networks:
      - backend
    depends_on:
      customer: { condition: service_started }
      jaeger: { condition: service_started }
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data: