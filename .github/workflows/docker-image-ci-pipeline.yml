# Docker Image CI Pipeline：Based on each modules' Dockerfile build and release image to Docker Hub（Support Mac arm64 and Linux amd64）
# Repo Secrets: DOCKER_USERNAME（Docker Hub account name）, DOCKER_PASSWORD（Docker Hub Password）
name: CI - Docker Build & Push

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: true
        default: "latest"
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build-and-push:
    name: Build and push Docker images (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1️⃣ Build JARs used by Docker images
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build JARs for Docker
        run: mvn clean package -DskipTests -B -q

      # 2️⃣ Set up QEMU for multi-arch
      - name: Set up QEMU
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3

      # 3️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          use: true

      - name: Inspect buildx builder
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: docker buildx inspect --bootstrap

      # 4️⃣ Docker login（Secrets: DOCKER_USER_NAME, DOCKER_PASSWORD）
      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Build & Push service Docker Images via helper script
      - name: Build & Push service Docker Images
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || github.sha }}
          DOCKER_USER_NAME: ${{ secrets.DOCKER_USER_NAME }}
        run: |
          chmod +x ./bin/build-images.sh
          ./bin/build-images.sh "${IMAGE_TAG}"